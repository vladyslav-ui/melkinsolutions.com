<style>
    :root {
        /* MELKIN Approved Color Palette */
        --melkin-dark: #292929;
        --melkin-gray: #585858;
        --melkin-gold: #ffc815;
        --melkin-white: #ffffff;
        --melkin-black: #000000;
    }

    .melkin-header-wrapper {
        background-color: transparent; /* Changed to transparent */
        border-bottom: none; /* Removed the heavy border for a cleaner floating look */
        padding: 35px 0 25px 0;
        font-family: "Palatino", "Palatino Linotype", "Palatino LT STD", "Book Antiqua", Georgia, serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        position: absolute; /* Forces the header to float over the hero section */
        top: 0;
        left: 0;
        z-index: 9999; /* Ensures it stays above all other page content */
    }

    .header-badge-container {
        margin-bottom: 25px;
        /* Strengthened drop shadow to ensure the black arch pops against complex image backgrounds */
        filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.7));
    }

    .header-badge-container img {
        height: 70px;
        width: auto;
        display: block;
        transition: transform 0.3s ease;
    }

    .header-badge-container img:hover {
        transform: scale(1.05);
    }

    .main-nav {
        display: flex;
        gap: 30px;
        align-items: center;
        justify-content: center;
    }

    .nav-item {
        text-decoration: none;
        color: var(--melkin-white);
        font-size: 1.05rem;
        letter-spacing: 0.8px;
        transition: color 0.3s ease, text-shadow 0.3s ease;
        /* Added text shadow for legibility over bright parts of background images */
        text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.8);
    }

    .nav-item:hover {
        color: var(--melkin-gold);
    }

    .bold-nav {
        font-weight: bold;
        color: var(--melkin-gold);
    }

    /* Move LinkedIn Icon to the right side */
    .social-link {
        position: absolute;
        right: 40px; 
        bottom: 28px; 
        /* Match drop shadow for consistency */
        filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.8));
    }

    .social-link svg {
        fill: var(--melkin-white);
        width: 22px;
        height: 22px;
        transition: fill 0.3s ease, transform 0.3s ease;
        display: block;
    }

    .social-link:hover svg {
        fill: var(--melkin-gold);
        transform: scale(1.1);
    }

    @media (max-width: 992px) {
        .main-nav {
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 80px 0 20px; 
        }
        .social-link {
            right: 20px;
        }
    }
</style>

<header class="melkin-header-wrapper">

        <a href="investments.html" class="nav-item">Investments</a>
        <a href="contact.html" class="nav-item">Contact</a>
    </nav>
