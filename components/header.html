<style>
  /* ==========================================================================
     GLOBAL HEADER STYLES
     ========================================================================== */
  .melkin-global-header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 9999;
    background: rgba(5, 5, 5, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    font-family: 'Courier New', Courier, monospace;
    transition: all 0.3s ease;
  }

  /* CRT Scanline Overlay */
  .melkin-global-header::before {
    content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.015), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.015));
    z-index: 0; background-size: 100% 4px, 6px 100%; pointer-events: none; opacity: 0.4;
  }

  .header-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 20px;
    height: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 2;
  }

  /* Brand / Logo */
  .brand-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    font-size: 1.4rem;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  
  .brand-logo .dim { color: #555; font-weight: normal; }
  .brand-logo .accent { color: #FFC107; }

  .status-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    background-color: #00E676;
    border-radius: 50%;
    box-shadow: 0 0 10px #00E676;
    animation: status-pulse 2s infinite;
  }
  @keyframes status-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }

  /* Desktop Navigation */
  .desktop-nav {
    display: flex;
    gap: 30px;
    align-items: center;
  }

  .nav-link {
    color: #aaaaaa;
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: color 0.2s ease;
    position: relative;
  }

  .nav-link::before {
    content: '> ';
    opacity: 0;
    color: #00E5FF;
    transition: opacity 0.2s ease;
  }

  .nav-link:hover { color: #ffffff; }
  .nav-link:hover::before { opacity: 1; }

  /* Call to Action Button */
  .action-btn {
    background: transparent;
    color: #FFC107;
    border: 1px solid #FFC107;
    padding: 10px 20px;
    font-size: 0.9rem;
    font-weight: bold;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s ease;
    box-shadow: 0 0 10px rgba(255, 193, 7, 0.1);
  }

  .action-btn:hover {
    background: #FFC107;
    color: #000;
    box-shadow: 0 0 20px rgba(255, 193, 7, 0.4);
  }

  /* Mobile Menu Button */
  .mobile-menu-btn {
    display: none;
    background: transparent;
    border: none;
    color: #fff;
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 2px;
  }
  .mobile-menu-btn:hover { color: #00E5FF; }

  /* Mobile Navigation Dropdown */
  .mobile-nav {
    display: none; 
    flex-direction: column;
    background: rgba(10, 10, 10, 0.98);
    border-bottom: 1px solid #333;
    padding: 20px;
    position: absolute;
    top: 80px;
    left: 0;
    width: 100%;
    box-sizing: border-box;
    z-index: 1;
  }

  .mobile-nav .nav-link {
    padding: 15px 0;
    border-bottom: 1px dashed #333;
    font-size: 1.1rem;
  }
  .mobile-nav .nav-link:last-child { border-bottom: none; }
  .mobile-nav .action-btn { margin-top: 20px; text-align: center; }

  /* Media Queries for Mobile */
  @media (max-width: 950px) {
    .desktop-nav { display: none; }
    .header-actions .action-btn { display: none; }
    .mobile-menu-btn { display: block; }
    .mobile-nav.active { display: flex; }
  }
</style>

<header class="melkin-global-header">
  <div class="header-container">
    
    <a href="index.html" class="brand-logo">
      <span class="status-dot"></span>
      MELKIN <span class="dim">//</span> <span class="accent">HAGES</span>
    </a>

    <nav class="desktop-nav">
      <a href="industries.html" class="nav-link">Industries</a>
      <a href="technology.html" class="nav-link">Technology</a>
      <a href="benefits.html" class="nav-link">Benefits</a>
      <a href="services.html" class="nav-link">Services</a>
    </nav>

    <div class="header-actions">
      <a href="contact.html" class="action-btn">Initiate Sortie</a>
      <button class="mobile-menu-btn" id="menuToggle">[ MENU ]</button>
    </div>

  </div>

  <nav class="mobile-nav" id="mobileNav">
    <a href="industries.html" class="nav-link">Industries</a>
    <a href="technology.html" class="nav-link">Technology</a>
    <a href="benefits.html" class="nav-link">Benefits</a>
    <a href="services.html" class="nav-link">Services</a>
    <a href="contact.html" class="action-btn">Initiate Sortie</a>
  </nav>
</header>

<script>
  /* Mobile menu logic */
  (function() {
    const toggle = document.getElementById('menuToggle');
    const nav = document.getElementById('mobileNav');
    if (toggle && nav) {
      toggle.addEventListener('click', function() {
        if (nav.classList.contains('active')) {
          nav.classList.remove('active');
          toggle.innerText = '[ MENU ]';
          toggle.style.color = '#fff';
        } else {
          nav.classList.add('active');
          toggle.innerText = '[ CLOSE ]';
          toggle.style.color = '#E53935'; 
        }
      });
    }
  })();
</script>
