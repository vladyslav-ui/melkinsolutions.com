<style>
    :root {
        --melkin-olive: #535246; 
        --accent-gold: #FFC107;
        --pure-white: #FFFFFF;
    }

    .melkin-header-wrapper {
        background-color: var(--melkin-olive);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
        padding: 35px 0 25px 0;
        font-family: "Palatino", "Palatino Linotype", "Palatino LT STD", "Book Antiqua", Georgia, serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        position: relative; /* Essential for the right-side positioning */
    }

    .header-badge-container {
        margin-bottom: 25px;
    }

    .header-badge-container img {
        height: 70px;
        width: auto;
        display: block;
        transition: transform 0.3s ease;
    }

    .header-badge-container img:hover {
        transform: scale(1.05);
    }

    .main-nav {
        display: flex;
        gap: 30px;
        align-items: center;
        justify-content: center;
    }

    .nav-item {
        text-decoration: none;
        color: var(--pure-white);
        font-size: 1.05rem;
        letter-spacing: 0.8px;
        transition: color 0.3s ease;
    }

    .nav-item:hover {
        color: var(--accent-gold);
    }

    .bold-nav {
        font-weight: bold;
    }

    /* Requirement: Move LinkedIn Icon to the right side */
    .social-link {
        position: absolute;
        right: 40px; /* Distance from the right edge */
        bottom: 28px; /* Aligns visually with the navigation row */
    }

    .social-link svg {
        fill: var(--pure-white);
        width: 22px;
        height: 22px;
        transition: fill 0.3s ease, transform 0.3s ease;
        display: block;
    }

    .social-link:hover svg {
        fill: var(--accent-gold);
        transform: scale(1.1);
    }

    @media (max-width: 992px) {
        .main-nav {
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 80px 0 20px; /* Space for the icon on smaller screens */
        }
        .social-link {
            right: 20px;
        }
    }
</style>
