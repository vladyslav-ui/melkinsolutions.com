<style>
  :root {
      /* MELKIN Approved Color Palette */
      --melkin-dark: #292929;
      --melkin-gray: #585858;
      --melkin-gold: #ffc815;
      --melkin-white: #ffffff;
      --melkin-black: #000000;
  }

  /* ==========================================================================
     MELKIN PRECISION ALIGNMENT FOOTER
     ========================================================================== */
  .melkin-global-footer {
    background-color: var(--melkin-white); /* White background guarantees legibility for the black-text primary logo */
    border-top: 4px solid var(--melkin-dark);
    padding: 50px 40px 30px 40px; 
    font-family: "Palatino", "Palatino Linotype", "Palatino LT STD", "Book Antiqua", Georgia, serif;
    color: var(--melkin-dark);
  }

  .footer-container {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-start; /* Aligns column headers at the top */
    gap: 30px;
  }

  /* Requirement: Increased Logo Visibility */
  .footer-brand {
    flex: 1.2; 
    display: flex;
    justify-content: flex-start;
  }

  .footer-logo-img {
    height: 135px; /* Maximum fidelity for the primary nameplate */
    width: auto;
    display: block;
  }

  /* Info Nodes Alignment */
  .footer-info-group {
    flex: 3;
    display: flex;
    justify-content: flex-end;
    gap: 70px;
    align-items: flex-start; 
  }

  .footer-col {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    min-width: 180px;
  }

  /* Requirement: Uniform Headers with Strict Margins */
  .footer-col h4 {
    font-size: 1rem;
    text-transform: uppercase;
    font-weight: bold;
    letter-spacing: 2px;
    color: var(--melkin-black); /* Black for maximum contrast against white background */
    margin: 0 0 20px 0; /* Consistent gap before first line of content */
    line-height: 1; /* Prevents invisible vertical shifts */
    white-space: nowrap;
  }

  /* Requirement: Horizontal Alignment for Content */
  .contact-item {
    text-decoration: none;
    color: var(--melkin-gray); /* Softer gray for non-header text */
    font-size: 0.95rem;
    margin: 0;
    padding: 0;
    line-height: 1.4; /* Matches across all columns */
    transition: color 0.3s ease;
    display: block;
    font-weight: 500;
  }

  .contact-item:hover {
    color: var(--melkin-gold);
  }

  /* Social Node Precision */
  .social-link-footer {
    display: block;
    line-height: 1; /* Aligns the top of the icon with the top of text */
  }

  .social-link-footer svg {
    fill: var(--melkin-dark);
    width: 24px;
    height: 24px;
    transition: fill 0.3s ease, transform 0.3s ease;
  }

  .social-link-footer:hover svg {
    fill: var(--melkin-gold);
  }

  /* Bottom Copyright Bar */
  .footer-bottom {
    max-width: 1400px;
    margin: 40px auto 0 auto;
    padding-top: 20px;
    border-top: 1px solid var(--melkin-gray);
    display: flex;
    justify-content: center;
    font-size: 0.85rem;
    color: var(--melkin-gray);
  }

  /* Responsive Adjustments */
  @media (max-width: 1100px) {
    .footer-info-group { gap: 30px; }
    .footer-logo-img { height: 110px; }
  }

  @media (max-width: 850px) {
    .footer-container {
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .footer-info-group {
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 40px;
    }
  }
</style>
